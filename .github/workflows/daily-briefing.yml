name: Daily SecOwl Intelligence Briefing

on:
  workflow_dispatch:
  schedule:
    - cron: "30 12 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check generator script
        run: npm run check

      - name: Generate briefing
        run: npm run generate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5' }}

      - name: Commit updated briefing
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html briefings/
          git diff --cached --quiet || git commit -m "Update daily intelligence briefing"
          git push
